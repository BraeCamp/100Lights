name: Desktop Build

# Builds Mac (DMG) and Windows (NSIS) installers when a release tag is pushed.
# Uploads artifacts to the GitHub release so electron-updater can find them.
#
# Trigger: push a tag like v0.2.0
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # electron-builder v25 internally calls `codesign --display --verbose=4` via
      # @electron/notarize's checkSignature(), which returns ESRCH ("No such process")
      # on GitHub's macos-14 runners even when signing succeeded. This shim intercepts
      # --display calls and suppresses that specific error; all other codesign calls
      # (actual signing) exec through to /usr/bin/codesign unchanged.
      - name: Install codesign shim
        run: |
          mkdir -p "$RUNNER_TEMP/shims"
          cat > "$RUNNER_TEMP/shims/codesign" << 'EOF'
          #!/bin/bash
          for arg in "$@"; do
            if [[ "$arg" == "--display" ]]; then
              /usr/bin/codesign "$@"
              code=$?
              if [[ $code -ne 0 ]]; then
                echo "[codesign-shim] --display failed (code=$code) — suppressing ESRCH" >&2
              fi
              exit 0
            fi
          done
          exec /usr/bin/codesign "$@"
          EOF
          chmod +x "$RUNNER_TEMP/shims/codesign"
          echo "$RUNNER_TEMP/shims" >> $GITHUB_PATH

      - name: Install electron dependencies
        working-directory: electron
        run: |
          npm ci
          node scripts/patch-check-signature.js

      - name: Build & package (Mac)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_FOR_PULL_REQUEST: false
          DEBUG: electron-builder
        run: npm run dist:mac

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build & package (Windows)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: dist-electron/*.exe
