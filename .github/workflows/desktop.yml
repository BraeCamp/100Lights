name: Desktop Build

# Builds Mac (DMG) and Windows (NSIS) installers when a release tag is pushed.
# Uploads artifacts to the GitHub release so electron-updater can find them.
#
# Trigger: push a tag like v0.2.0
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Import signing certificate into keychain
        env:
          MAC_CERT_B64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          set -x

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$MAC_CERT_B64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$HOME/Library/Keychains/login.keychain-db" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          security find-identity -v -p codesigning
          security show-keychain-info "$KEYCHAIN_PATH"
          security dump-keychain "$KEYCHAIN_PATH" || true

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Unlock keychain before build
        run: security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Verify build environment
        run: |
          set -x
          ls -la dist-electron/ || echo "dist-electron does not exist yet"
          which codesign
          security find-identity -v -p codesigning

      - name: Build & package (Mac)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          CSC_FOR_PULL_REQUEST: false
          DEBUG: electron-builder
        run: npm run dist:mac

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build & package (Windows)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: dist-electron/*.exe
