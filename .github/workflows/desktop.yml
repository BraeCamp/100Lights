name: Desktop Build

# Builds Mac (DMG) and Windows (NSIS) installers when a release tag is pushed.
# Uploads artifacts to the GitHub release so electron-updater can find them.
#
# Trigger: push a tag like v0.2.0
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install electron dependencies
        working-directory: electron
        run: |
          npm ci
          node scripts/patch-check-signature.js

      - name: Decode Apple API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [ -z "$APPLE_API_KEY_CONTENT" ] || [ -z "$APPLE_API_KEY_ID" ]; then
            echo "ERROR: APPLE_API_KEY_CONTENT or APPLE_API_KEY_ID secret is empty"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_CONTENT" | base64 -D > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build & package (Mac)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_FOR_PULL_REQUEST: false
          DEBUG: electron-builder
        run: npm run dist:mac

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build & package (Windows)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installers
          path: dist-electron/*.exe
